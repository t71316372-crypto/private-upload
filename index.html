<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Just the two of us 二人の場所</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Yomogi&display=swap" rel="stylesheet">
<style>
  * {
  box-sizing: border-box;
}
  body { font-family: "Yomogi", cursive; max-width: 600px; margin: auto; padding: 10px; }
  #mainContent { display: none; }

  .card { background: #fff; padding: 15px; border-radius: 12px; margin-top: 15px; }

  #chatLog { margin-top: 25px; max-height: 550px; overflow-y: auto; padding-right: 5px; }

  .msg { background: #fef2f2; padding: 12px; border-radius: 12px; margin-bottom: 15px; border-left: 5px solid #fca5a5; }
  .name-tag { font-size: 0.8rem; color: #8b5cf6; font-weight: bold; margin-bottom: 5px; }
  .msg-text {
  margin-bottom: 12px;
  word-break: break-all;
  font-size: 1.05rem;
  white-space: pre-wrap;
}

  .reaction-container {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 8px;
    border-top: 1px dashed #ffdada;
    padding-top: 8px;
  }

  .reaction-btn {
    background: #fff;
    border: 1px solid #ffeded;
    border-radius: 15px;
    padding: 2px 10px;
    cursor: pointer;
    font-size: 0.9rem;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .reaction-count { font-weight: bold; color: #fca5a5; }

  textarea { width: 100%; height: 80px; margin-top: 10px; }
  button { margin-top: 10px; }

  .nav-link { display: inline-block; margin-top: 10px; color: #8b5cf6; text-decoration: none; }
  .name-buttons {
  display: flex;
  gap: 8px;
  margin-bottom: 8px;
}

.name-btn {
  padding: 8px 18px;
  border-radius: 18px;
  border: 1px solid #c4b5fd;
  background: #fff;
  cursor: pointer;
}

.name-btn.active {
  background: #ede9fe;
  color: #7c3aed;
  font-weight: bold;
}
 .chat-image{
  width:100%;
  max-width:320px;
  border-radius:12px;
  margin-top:10px;
  cursor:pointer;
}

 .delete-btn {
  margin-top: 8px;
  padding: 4px 10px;
  font-size: 0.8rem;
  border-radius: 10px;
  border: 1px solid #fca5a5;
  background: #fff;
  color: #ef4444;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="lockScreen" class="card" style="margin-top: 50px; text-align: center;">
  <h2>🔒 Just the two of us</h2>
  <input type="password" id="passInput" placeholder="合言葉">
  <button onclick="checkPass()">入室する</button>
</div>

<div id="mainContent">
  <h1>Just the two of us<br>会話空間</h1>

  <div class="card">
  <div class="name-buttons">
  <button type="button" class="name-btn active" data-name="まさ">まさ</button>
  <button type="button" class="name-btn" data-name="まい">まい</button>
</div>
<input type="hidden" id="nameSelect" value="まさ">

   <textarea id="chatInput" placeholder="メッセージを入力"></textarea>

<input
  type="file"
  id="imageInput"
  accept="image/*"
  style="display:block;margin-top:10px;">

<button id="sendBtn" onclick="sendMsg()">話しかける</button>

    <div id="chatLog"></div>
  </div>

  <div class="card" style="text-align:center;">
  <a href="audio.html" class="nav-link">・ 声を聴く</a><br>
  <a href="schedule.html" class="nav-link">・ 話せそうな日</a>
</div>
</div>

<script>
 const PASSWORDS = ["2025", "20250811"];

function checkPass() {
  const input = document.getElementById('passInput').value;

  if (PASSWORDS.includes(input)) {
    document.getElementById('lockScreen').style.display = 'none';
    document.getElementById('mainContent').style.display = 'block';
    initApp();
  } else {
    alert("合言葉が違うみたい…");
  }
}

  function initApp() {
    const p = "https://", d = "vawogrqmymsqhkwlywuf", s = ".supabase.co";
    const sb = window.supabase.createClient(p + d + s, "sb_publishable_HC3LYlPQpF6dpz7t56A8QQ_6sEDJ20l");

    const stamps = [
      { k: 'smile', i: '😊' },
      { k: 'worried', i: '😟' },
      { k: 'cry', i: '😭' },
      { k: 'sparkle', i: '✨' }
    ];

    document.querySelectorAll(".name-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".name-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById("nameSelect").value = btn.dataset.name;
  });
});

    async function load() {
      const { data } = await sb.from('messages').select('*').order('created_at', { ascending: false });

      const log = document.getElementById('chatLog');

      log.innerHTML = data.map(m => {
        const counts = m.reactions || {};

        const reactionHtml = stamps.map(st => `
          <button class="reaction-btn" onclick="addReaction(${m.id}, '${st.k}')">
            ${st.i} <span class="reaction-count">${counts[st.k] || 0}</span>
          </button>
        `).join("");

      return `
  <div class="msg">
    <div class="name-tag">${m.sender_name}</div>

    <div class="msg-text">${m.text || ""}</div>

    ${
      m.image_url
      ? `<img
           src="${m.image_url}"
           class="chat-image"
           onclick="openImage('${m.image_url}')">`
      : ""
    }

    <div class="reaction-container">
      ${reactionHtml}
    </div>

    <button class="delete-btn" onclick="deleteMsg(${m.id})">削除</button>
  </div>
`;
      }).join("");

  
    }

    window.addReaction = async (id, type) => {
      const { data } = await sb.from('messages').select('reactions').eq('id', id).single();

      const reactions = data.reactions || {};
      const key = `reaction_${id}_${type}`;
      const alreadyReacted = localStorage.getItem(key) === "1";

      if (alreadyReacted) {
        reactions[type] = Math.max((reactions[type] || 0) - 1, 0);
        localStorage.removeItem(key);
      } else {
        reactions[type] = (reactions[type] || 0) + 1;
        localStorage.setItem(key, "1");
      }

      await sb.from('messages').update({ reactions }).eq('id', id);
      load();
    };

    window.sendMsg = async () => {
  const txt = document.getElementById('chatInput');
  const btn = document.getElementById('sendBtn');
  const imageInput = document.getElementById('imageInput');

  const textValue = txt.value.trim();
  const imageFile = imageInput.files[0];

  if (!textValue && !imageFile) {
    txt.value = "";
    return;
  }

  btn.disabled = true;

  let imageUrl = null;

  if (imageFile) {
    const ext = imageFile.name.split('.').pop();
    const fileName = `chat-${Date.now()}.${ext}`;

    const { error: uploadError } = await sb.storage
      .from('images')
      .upload(fileName, imageFile, {
        cacheControl: '3600',
        upsert: false,
        contentType: imageFile.type
      });

    if (uploadError) {
      alert("画像アップロード失敗: " + uploadError.message);
      console.error(uploadError);
      btn.disabled = false;
      return;
    }

    const { data: urlData } = sb.storage
      .from('images')
      .getPublicUrl(fileName);

    imageUrl = urlData.publicUrl;
  }

  const { error } = await sb.from('messages').insert([{
    text: textValue,
    sender_name: document.getElementById('nameSelect').value,
    image_url: imageUrl,
    reactions: {}
  }]);

  if (error) {
    alert("投稿失敗: " + error.message);
    console.error(error);
    btn.disabled = false;
    return;
  }

  txt.value = "";
  imageInput.value = "";
  btn.disabled = false;

  load();
};
window.deleteMsg = async (id) => {
  if (!confirm("この投稿を削除しますか？")) return;

  const { error } = await sb
    .from('messages')
    .delete()
    .eq('id', id);

  if (error) {
    alert("削除できません: " + error.message);
    console.error(error);
    return;
  }

  load();
};
    load();

    sb.channel('messages-realtime')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, () => {
        load();

window.openImage = function(url){
    document.getElementById("viewerImg").src = url;
    document.getElementById("imageViewer").style.display = "flex";
}

window.closeImage = function(){
    document.getElementById("imageViewer").style.display = "none";
}
       
      })
      .subscribe();
  }
</script>
<div id="imageViewer"
     style="
       display:none;
       position:fixed;
       left:0;
       top:0;
       width:100%;
       height:100%;
       background:rgba(0,0,0,.9);
       z-index:9999;
       justify-content:center;
       align-items:center;"
     onclick="closeImage()">

  <img id="viewerImg"
       style="max-width:95%;max-height:95%;border-radius:12px;">
</div>
</body>
</html>
