<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>話せそうな日</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@400;500&display=swap" rel="stylesheet">

<style>
  body {
    font-family: "Kiwi Maru", sans-serif;
    max-width: 600px;
    margin: auto;
    padding: 16px;
    background: #fffafa;
    color: #444;
  }

  h1 {
    text-align: center;
    color: #8b5cf6;
  }

  .card {
    background: #fff;
    border-radius: 16px;
    padding: 16px;
    margin: 16px 0;
    border: 1px solid #f3dada;
  }

  select, input, button {
    font-family: inherit;
    font-size: 1rem;
    margin: 6px 0;
    padding: 6px;
  }

  button {
    border-radius: 10px;
    border: 1px solid #fca5a5;
    background: #fff;
    cursor: pointer;
  }

  .item {
    border-left: 5px solid #fca5a5;
    padding: 12px;
    margin-bottom: 12px;
    background: #fff7f7;
    border-radius: 12px;
  }

  .date {
    font-size: 1.2rem;
    font-weight: bold;
  }

  .slot {
    margin-top: 6px;
    color: #8b5cf6;
    font-weight: bold;
  }

  .name {
    margin-top: 4px;
  }

  .delete-btn {
    margin-top: 8px;
    font-size: 0.85rem;
    color: #ef4444;
  }

  .back-link {
    display: block;
    text-align: center;
    margin-top: 24px;
    color: #8b5cf6;
    text-decoration: none;
  }
</style>
</head>

<body>

<h1>次に話せそうな日</h1>

<div class="card">
  <h3>候補日を追加</h3>

  <div>
    <label>名前</label><br>
    <select id="nameInput">
      <option value="まさ">まさ</option>
      <option value="まい">まい</option>
    </select>
  </div>

  <div>
    <label>日付</label><br>
    <input type="date" id="dateInput">
  </div>

  <div>
    <label>時間帯</label><br>
    <select id="slotInput">
      <option value="夜">夜</option>
      <option value="夕方">夕方</option>
      <option value="昼">昼</option>
      <option value="午前">午前</option>
      <option value="終日">終日</option>
    </select>
  </div>

  <button onclick="addDay()">登録</button>
  <p id="status"></p>
</div>

<div class="card">
  <h3>候補一覧</h3>
  <div id="dayList">読み込み中...</div>
</div>

<a href="./index.html" class="back-link">← トークルームに戻る</a>

<script>
  const SUPABASE_URL = "https://vawogrqmymsqhkwlywuf.supabase.co";
  const SUPABASE_KEY = "sb_publishable_HC3LYlPQpF6dpz7t56A8QQ_6sEDJ20l";

  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  function formatDate(dateStr) {
    const d = new Date(dateStr + "T00:00:00");
    const week = ["日", "月", "火", "水", "木", "金", "土"][d.getDay()];
    return `${d.getMonth() + 1}/${d.getDate()}（${week}）`;
  }

  async function loadDays() {
    const list = document.getElementById("dayList");

    const { data, error } = await sb
      .from("available_days")
      .select("*")
      .order("date", { ascending: true });

    if (error) {
      list.textContent = "読み込み失敗: " + error.message;
      console.error(error);
      return;
    }

    if (!data || data.length === 0) {
      list.textContent = "まだ候補日はありません。";
      return;
    }

    list.innerHTML = data.map(item => `
      <div class="item">
        <div class="date">${formatDate(item.date)}</div>
        <div class="slot">${item.time_slot}</div>
        <div class="name">${item.name}</div>
        <button class="delete-btn" onclick="deleteDay(${item.id})">削除</button>
      </div>
    `).join("");
  }

  async function addDay() {
    const name = document.getElementById("nameInput").value;
    const date = document.getElementById("dateInput").value;
    const time_slot = document.getElementById("slotInput").value;
    const status = document.getElementById("status");

    if (!date) {
      status.textContent = "日付を選んでください。";
      return;
    }

    const { error } = await sb
      .from("available_days")
      .insert([{ name, date, time_slot }]);

    if (error) {
      status.textContent = "登録失敗: " + error.message;
      console.error(error);
      return;
    }

    status.textContent = "登録しました。";
    document.getElementById("dateInput").value = "";
    loadDays();
  }

  async function deleteDay(id) {
    if (!confirm("この候補日を削除しますか？")) return;

    const { error } = await sb
      .from("available_days")
      .delete()
      .eq("id", id);

    if (error) {
      alert("削除失敗: " + error.message);
      console.error(error);
      return;
    }

    loadDays();
  }

  loadDays();
</script>

</body>
</html>
