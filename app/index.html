<script>
  const PASSWORD = "m&m2025";

  function checkPass() {
    if (document.getElementById('passInput').value === PASSWORD) {
      document.getElementById('lockScreen').style.display = 'none';
      document.getElementById('mainContent').style.display = 'block';
      initApp();
    } else {
      alert("合言葉が違うみたい…");
    }
  }

  function initApp() {
    const p = "https://", d = "vawogrqmymsqhkwlywuf", s = ".supabase.co";
    const sb = window.supabase.createClient(p + d + s, "sb_publishable_HC3LYlPQpF6dpz7t56A8QQ_6sEDJ20l");

    const stamps = [
      { k: 'smile', i: '😊' },
      { k: 'worried', i: '😟' },
      { k: 'cry', i: '😭' },
      { k: 'sparkle', i: '✨' }
    ];

    // Enter送信（Shift+Enterは改行）
    document.getElementById('chatInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMsg();
      }
    });

    async function load() {
      const { data, error } = await sb
        .from('messages')
        .select('*')
        .order('created_at', { ascending: false });

      if (error) {
        console.error(error);
        return;
      }

      const log = document.getElementById('chatLog');

      log.innerHTML = data.map(m => {
        const counts = m.reactions || {};

        const reactionHtml = stamps.map(st => `
          <button class="reaction-btn" onclick="addReaction(${m.id}, '${st.k}')">
            ${st.i} <span class="reaction-count">${counts[st.k] || 0}</span>
          </button>
        `).join("");

        return `
          <div class="msg">
            <div class="name-tag">${m.sender_name}</div>
            <div class="msg-text">${m.text}</div>
            <div class="reaction-container">${reactionHtml}</div>
          </div>
        `;
      }).join("");

      // 自動スクロール
      log.scrollTop = log.scrollHeight;
    }

    window.addReaction = async (id, type) => {
      const { data, error } = await sb
        .from('messages')
        .select('reactions')
        .eq('id', id)
        .single();

      if (error) {
        console.error(error);
        return;
      }

      const reactions = data.reactions || {};
      const key = `reaction_${id}_${type}`;
      const alreadyReacted = localStorage.getItem(key) === "1";

      if (alreadyReacted) {
        reactions[type] = Math.max((reactions[type] || 0) - 1, 0);
        localStorage.removeItem(key);
      } else {
        reactions[type] = (reactions[type] || 0) + 1;
        localStorage.setItem(key, "1");
      }

      const { error: updateError } = await sb
        .from('messages')
        .update({ reactions })
        .eq('id', id);

      if (updateError) {
        console.error(updateError);
        return;
      }

      load();
    };

    window.sendMsg = async () => {
      const txt = document.getElementById('chatInput');
      const btn = document.getElementById('sendBtn');

      if (!txt.value.trim()) {
        txt.value = "";
        return;
      }

      btn.disabled = true;

      const { error } = await sb.from('messages').insert([{
        text: txt.value,
        sender_name: document.getElementById('nameSelect').value,
        reactions: {}
      }]);

      if (error) {
        alert("エラー: " + error.message);
        console.error(error);
        btn.disabled = false;
        return;
      }

      txt.value = "";
      txt.focus(); // フォーカス戻す
      btn.disabled = false;

      load();
    };

    load();

    sb.channel('messages-realtime')
      .on(
        'postgres_changes',
        { event: '*', schema: 'public', table: 'messages' },
        () => {
          load();
        }
      )
      .subscribe((status) => {
        console.log("REALTIME STATUS", status);
      });
  }
</script>
