<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Just the two of us  二人の場所</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kurenaido&display=swap" rel="stylesheet">
<style>
  #mainContent { display: none; }
  body { font-family: "Zen Kurenaido", serif; max-width: 600px; 
  #chatLog { margin-top: 25px; max-height: 550px; overflow-y: auto; padding-right: 5px; }
  .msg { background: #fef2f2; padding: 12px; border-radius: 12px; margin-bottom: 15px; border-left: 5px solid #fca5a5; }
  .name-tag { font-size: 0.8rem; color: #8b5cf6; font-weight: bold; margin-bottom: 5px; }
  .msg-text { margin-bottom: 12px; word-break: break-all; font-size: 1.05rem; }

  /* ★リアクションエリアをスッキリ横並びに */
  .reaction-container { 
    display: flex; 
    flex-wrap: wrap; 
    gap: 8px; 
    margin-top: 8px;
    border-top: 1px dashed #ffdada;
    padding-top: 8px;
  }

  /* ★ボタンを「スタンプ」っぽく小さく */
  .reaction-btn { 
    background: #fff; 
    border: 1px solid #ffeded; 
    border-radius: 15px; 
    padding: 2px 10px; 
    cursor: pointer; 
    font-size: 0.9rem; 
    display: flex; 
    align-items: center; 
    gap: 4px;
    transition: 0.2s;
  }
  .reaction-btn:hover { background: #fff1f1; border-color: #fca5a5; }
  .reaction-count { font-weight: bold; color: #fca5a5; }

  .nav-link { display: inline-block; margin-top: 10px; color: #8b5cf6; text-decoration: none; }
</style>
</head>
<body>

<div id="lockScreen" class="card" style="margin-top: 50px; text-align: center;">
  <h2>🔒 二人の場所</h2>
  <input type="password" id="passInput" placeholder="合言葉">
  <button onclick="checkPass()">入室する</button>
</div>

<div id="mainContent">
  <h1>Just the two of us<br>二人の場所</h1>
  <div class="card">
    <select id="nameSelect"><option value="まさ">まさ</option><option value="まい">まい</option></select>
    <textarea id="chatInput" placeholder="メッセージを入力"></textarea>
   <button id="sendBtn" onclick="sendMsg()">話しかける</button>
    <div id="chatLog"></div>
  </div>
  <div class="card" style="text-align:center;">
    <a href="images.html" class="nav-link">・ 写真を見る</a><br>
    <a href="audio.html" class="nav-link">・ 声を聴く</a>
  </div>
</div>

<script>
  const PASSWORD = "m&m2025"; // ここを書き換えてください

  function checkPass() {
    if (document.getElementById('passInput').value === PASSWORD) {
      document.getElementById('lockScreen').style.display = 'none';
      document.getElementById('mainContent').style.display = 'block';
      initApp();
    } else { alert("合言葉が違うみたい…"); }
  }

  function initApp() {
    const p = "https://", d = "vawogrqmymsqhkwlywuf", s = ".supabase.co";
    const sb = window.supabase.createClient(p+d+s, "sb_publishable_HC3LYlPQpF6dpz7t56A8QQ_6sEDJ20l");
    const stamps = [{k:'good',i:'👍'},{k:'smile',i:'😊'},{k:'worried',i:'😟'},{k:'cry',i:'😭'},{k:'sparkle',i:'✨'}];

    async function load() {
      const { data } = await sb.from('messages').select('*').order('created_at', { ascending: false });
      if (data) {
        document.getElementById('chatLog').innerHTML = data.map(m => {
          const counts = m.reactions || {};
          const reactionHtml = stamps.map(s => `
            <button class="reaction-btn" onclick="addReaction(${m.id}, '${s.k}', ${counts[s.k] || 0})">
              ${s.i} <span class="reaction-count">${counts[s.k] || 0}</span>
            </button>
          `).join("");
          return `<div class="msg"><div class="name-tag">${m.sender_name}</div><div class="msg-text">${m.text}</div><div class="reaction-container">${reactionHtml}</div></div>`;
        }).join("");
      }
    }

    window.addReaction = async (id, type, current) => {
      const { data } = await sb.from('messages').select('reactions').eq('id', id).single();
      const newR = data.reactions || {};
      newR[type] = (newR[type] || 0) + 1;
      await sb.from('messages').update({ reactions: newR }).eq('id', id);
      load();
    };

  window.sendMsg = async () => {
  const txt = document.getElementById('chatInput');
  if (!txt.value.trim()) return;

  const { error } = await sb.from('messages').insert([{
    text: txt.value,
    sender_name: document.getElementById('nameSelect').value,
    reactions: {}
  }]);

  if (error) {
    alert("エラー: " + error.message);
    console.error(error);
    return;
  }

  txt.value = "";
  load();
};
    load();
    sb.channel('messages')
  .on(
    'postgres_changes',
    { event: '*', schema: 'public', table: 'messages' },
    () => {
      load();
    }
  )
  .subscribe();
  }
</script>
</body>
</html>
