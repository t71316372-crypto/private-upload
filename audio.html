<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>声を聴く</title>

<link href="https://fonts.googleapis.com/css2?family=Zen+Kurenaido&display=swap" rel="stylesheet">

<style>
  body {
    font-family: "Zen Kurenaido", serif;
    max-width: 600px;
    margin: auto;
    padding: 16px;
    background: #fffafa;
    color: #444;
  }

  h1 {
    text-align: center;
    font-size: 1.8rem;
    color: #8b5cf6;
  }

  .card {
    background: #fff;
    border-radius: 16px;
    padding: 16px;
    margin: 16px 0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    border-left: 5px solid #fca5a5;
  }

  .title {
    font-weight: bold;
    margin-bottom: 8px;
    color: #555;
  }

  audio {
    width: 100%;
    margin-top: 8px;
  }

  .back-link {
    display: block;
    text-align: center;
    margin-top: 24px;
    color: #8b5cf6;
    text-decoration: none;
  }
</style>
</head>

<body>

<h1>声を聴く</h1>

<div class="card">
  <div class="title">声 1</div>
  <audio controls>
    <source src="audio/voice1.mp3" type="audio/mpeg">
    このブラウザでは音声を再生できません。
  </audio>
</div>

<div class="card">
  <div class="title">声 2</div>
  <audio controls>
    <source src="audio/voice2.mp3" type="audio/mpeg">
    このブラウザでは音声を再生できません。
  </audio>
</div>

<a href="./index.html" class="back-link">← トークルームに戻る</a>

</body>
</html>
