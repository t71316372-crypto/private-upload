  <script>
    // ★ここを正確にコピーしてください
    const SUPABASE_URL = "https://vawogrqmymsqhkwlywuf.supabase.co";
    const SUPABASE_KEY = "sb_publishable_HC3LYlPQpF6dpz7t56A8QQ_6sEDJ20l";

    // 接続クライアントの作成
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

   async function displayImages() {
  const gallery = document.getElementById("gallery");

  const { data, error } = await client.storage
    .from("imeges")
    .list(undefined, {
      limit: 100,
      offset: 0,
      sortBy: { column: "name", order: "asc" }
    });
console.log("LIST RESULT", data, error);
  if (error) {
    gallery.innerHTML = "エラー: " + error.message;
    return;
  }

  if (!data || data.length === 0) {
    gallery.innerHTML = "画像が見つかりません。";
    return;
  }

  gallery.innerHTML = "";

  data.forEach(file => {
    const { data: urlData } = client.storage
      .from("imeges")
      .getPublicUrl(file.name);

    const img = document.createElement("img");
    img.src = urlData.publicUrl;
    img.style.width = "100%";
    img.style.marginBottom = "10px";

    gallery.appendChild(img);
  });
}

    displayImages()
    console.log("SUPABASE_URL", SUPABASE_URL);
  </script>
